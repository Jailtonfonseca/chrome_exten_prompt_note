<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#2d2d44"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3d5c"/>
      <stop offset="100%" style="stop-color:#2d2d44"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Header/Navbar -->
  <rect x="0" y="0" width="800" height="60" fill="#252536"/>
  <text x="20" y="38" font-family="Arial" font-size="20" fill="#8b5cf6" font-weight="bold">AI Prompt Studio</text>

  <!-- Search bar -->
  <rect x="580" y="15" width="200" height="30" rx="8" fill="#3d3d5c"/>
  <text x="600" y="35" font-family="Arial" font-size="12" fill="#888">🔍 Search prompts...</text>

  <!-- Theme toggle -->
  <rect x="520" y="15" width="50" height="30" rx="15" fill="#6366f1"/>
  <circle cx="550" cy="30" r="10" fill="#fff"/>

  <!-- Main Content Area -->
  <!-- Prompt Card 1 -->
  <rect x="30" y="90" width="350" height="140" rx="12" fill="url(#card)"/>
  <rect x="30" y="90" width="6" height="140" rx="3" fill="#6366f1"/>
  <text x="55" y="120" font-family="Arial" font-size="16" fill="#fff" font-weight="bold">Code Review Expert</text>
  <text x="55" y="145" font-family="Arial" font-size="11" fill="#888">You are an expert code reviewer...</text>
  <text x="55" y="165" font-family="Arial" font-size="10" fill="#6366f1">#coding #review</text>
  <circle cx="320" cy="115" r="12" fill="#fbbf24"/>
  <text x="316" y="119" font-family="Arial" font-size="10" fill="#000">★</text>
  <rect x="280" y="200" width="80" height="20" rx="5" fill="#6366f1"/>
  <text x="300" y="214" font-family="Arial" font-size="10" fill="#fff">Copy</text>

  <!-- Prompt Card 2 -->
  <rect x="420" y="90" width="350" height="140" rx="12" fill="url(#card)"/>
  <rect x="420" y="90" width="6" height="140" rx="3" fill="#8b5cf6"/>
  <text x="445" y="120" font-family="Arial" font-size="16" fill="#fff" font-weight="bold">SQL Generator</text>
  <text x="445" y="145" font-family="Arial" font-size="11" fill="#888">Generate optimized SQL queries...</text>
  <text x="445" y="165" font-family="Arial" font-size="10" fill="#8b5cf6">#sql #database</text>
  <circle cx="710" cy="115" r="12" fill="#3d3d5c"/>
  <text x="706" y="119" font-family="Arial" font-size="10" fill="#888">☆</text>
  <rect x="670" y="200" width="80" height="20" rx="5" fill="#6366f1"/>
  <text x="690" y="214" font-family="Arial" font-size="10" fill="#fff">Copy</text>

  <!-- Prompt Card 3 -->
  <rect x="30" y="250" width="350" height="140" rx="12" fill="url(#card)"/>
  <rect x="30" y="250" width="6" height="140" rx="3" fill="#10b981"/>
  <text x="55" y="280" font-family="Arial" font-size="16" fill="#fff" font-weight="bold">UX Writer</text>
  <text x="55" y="305" font-family="Arial" font-size="11" fill="#888">Write clear and concise user...</text>
  <text x="55" y="325" font-family="Arial" font-size="10" fill="#10b981">#ux #writing</text>
  <circle cx="320" cy="275" r="12" fill="#fbbf24"/>
  <text x="316" y="279" font-family="Arial" font-size="10" fill="#000">★</text>
  <rect x="280" y="360" width="80" height="20" rx="5" fill="#6366f1"/>
  <text x="300" y="374" font-family="Arial" font-size="10" fill="#fff">Copy</text>

  <!-- Prompt Card 4 -->
  <rect x="420" y="250" width="350" height="140" rx="12" fill="url(#card)"/>
  <rect x="420" y="250" width="6" height="140" rx="3" fill="#f59e0b"/>
  <text x="445" y="280" font-family="Arial" font-size="16" fill="#fff" font-weight="bold">API Documentation</text>
  <text x="445" y="305" font-family="Arial" font-size="11" fill="#888">Create comprehensive API docs...</text>
  <text x="445" y="325" font-family="Arial" font-size="10" fill="#f59e0b">#docs #api</text>
  <circle cx="710" cy="275" r="12" fill="#fbbf24"/>
  <text x="716" y="279" font-family="Arial" font-size="10" fill="#000">★</text>
  <rect x="670" y="360" width="80" height="20" rx="5" fill="#6366f1"/>
  <text x="690" y="374" font-family="Arial" font-size="10" fill="#fff">Copy</text>

  <!-- Floating Action Button -->
  <circle cx="740" cy="500" r="35" fill="url(#accent)"/>
  <text x="730" y="508" font-family="Arial" font-size="28" fill="#fff">+</text>

  <!-- Footer -->
  <rect x="0" y="570" width="800" height="30" fill="#252536"/>
  <text x="380" y="590" font-family="Arial" font-size="11" fill="#666">AI Prompt Studio</text>
</svg>